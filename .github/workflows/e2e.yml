name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build web app
        run: npm run build

  # E2E tests — manual trigger only (requires Appium deps to be installed)
  e2e:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: test-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java (for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Install E2E test dependencies
        run: |
          npm install @wdio/cli @wdio/local-runner @wdio/mocha-framework @wdio/appium-service @wdio/spec-reporter @wdio/types webdriverio appium appium-uiautomator2-driver tsx typescript
          ls -la node_modules/.bin/wdio && ls -la node_modules/.bin/appium && ls -la node_modules/.bin/tsx && echo "E2E binaries OK" || { echo "ERROR: E2E binaries missing"; exit 1; }

      - name: Build web app
        run: npm run build

      - name: Prepare Android platform
        run: |
          rm -rf android
          npx cap add android

      - name: Restore custom build config
        run: |
          git checkout -- android/app/build.gradle android/app/proguard-rules.pro

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Remove unused WASM
        run: rm -f dist/wasm/sql-wasm.wasm

      - name: Create debug keystore for signing
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run E2E tests on Android emulator
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          emulator-options: -no-snapshot -no-audio -no-window -no-boot-anim -gpu swiftshader_indirect -memory 2048
          emulator-boot-timeout: 900
          force-avd-creation: false
          disable-animations: true
          script: PATH=$PWD/node_modules/.bin:$PATH wdio run e2e/wdio.conf.ts

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            e2e/logs/
            android/app/build/outputs/apk/release/
          retention-days: 7
