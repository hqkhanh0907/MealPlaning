<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img">
  <title>SmartMeal — Spark</title>
  <desc>Ultra-clean: emerald gradient with a single white 4-point star — representing AI-powered wellness</desc>
  <defs>
    <linearGradient id="sp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="45%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Rich emerald gradient -->
  <rect width="512" height="512" rx="112" fill="url(#sp-bg)"/>

  <!-- Single bold 4-point star — large, centered -->
  <polygon points="256,80 280,212 412,256 280,300 256,432 232,300 100,256 232,212"
           fill="#FFFFFF"/>

  <!-- Inner cutout circle — makes it feel like a compass/ring -->
  <circle cx="256" cy="256" r="44" fill="url(#sp-bg)"/>
</svg>
