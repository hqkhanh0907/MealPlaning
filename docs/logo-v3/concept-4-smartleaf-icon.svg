<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img">
  <title>SmartMeal — SmartLeaf</title>
  <desc>A bold emerald leaf with clean S lettermark and subtle AI sparkle</desc>
  <defs>
    <linearGradient id="sl-grad" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="40%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="sl-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="112" fill="url(#sl-bg)"/>

  <!-- Clean leaf shape — pointed top, round bottom -->
  <path d="M256 68
           C204 68, 108 164, 108 280
           C108 368, 170 448, 256 448
           C342 448, 404 368, 404 280
           C404 164, 308 68, 256 68Z"
        fill="url(#sl-grad)"/>

  <!-- Bold "S" lettermark — clean, centered, thick -->
  <g transform="translate(256, 268)">
    <path d="M44,-68 L-4,-68
             C-44,-68 -64,-50 -64,-24
             C-64,4 -44,18 -4,18
             L4,18
             C44,18 64,32 64,58
             C64,84 44,100 4,100
             L-44,100"
          fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Single elegant AI sparkle — top right -->
  <g transform="translate(366, 148)">
    <circle cx="0" cy="0" r="4" fill="#6EE7B7"/>
    <g stroke="#6EE7B7" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
      <line x1="0" y1="-12" x2="0" y2="-7"/>
      <line x1="0" y1="7" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="-7" y2="0"/>
      <line x1="7" y1="0" x2="12" y2="0"/>
    </g>
  </g>

  <!-- Tiny sparkle — bottom left for balance -->
  <g transform="translate(152, 380)">
    <circle cx="0" cy="0" r="2.5" fill="#6EE7B7" opacity="0.4"/>
    <g stroke="#6EE7B7" stroke-width="1.5" stroke-linecap="round" opacity="0.35">
      <line x1="0" y1="-8" x2="0" y2="-5"/>
      <line x1="0" y1="5" x2="0" y2="8"/>
      <line x1="-8" y1="0" x2="-5" y2="0"/>
      <line x1="5" y1="0" x2="8" y2="0"/>
    </g>
  </g>
</svg>
