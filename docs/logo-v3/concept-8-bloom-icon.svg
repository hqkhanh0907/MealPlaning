<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img">
  <title>SmartMeal — Bloom</title>
  <desc>Three overlapping circles forming a trefoil/bloom pattern — each circle = one pillar</desc>
  <defs>
    <linearGradient id="bl-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#022C22"/>
      <stop offset="100%" stop-color="#064E3B"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="112" fill="url(#bl-bg)"/>

  <!-- Three overlapping circles — trefoil pattern -->
  <!-- Top circle (Meal) -->
  <circle cx="256" cy="192" r="88" fill="#10B981" opacity="0.85"/>
  <!-- Bottom-left circle (Fitness) -->
  <circle cx="180" cy="320" r="88" fill="#059669" opacity="0.85"/>
  <!-- Bottom-right circle (AI) -->
  <circle cx="332" cy="320" r="88" fill="#34D399" opacity="0.85"/>

  <!-- Subtle white icons inside each circle -->
  <!-- Meal: fork+knife -->
  <g transform="translate(256, 172)" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.5">
    <line x1="-8" y1="-16" x2="-8" y2="16"/>
    <line x1="8" y1="-16" x2="8" y2="16"/>
    <rect x="5" y="-16" width="8" height="14" rx="4" fill="none"/>
  </g>
  <!-- Fitness: dumbbell -->
  <g transform="translate(180, 302)" opacity="0.5">
    <rect x="-20" y="-3" width="40" height="6" rx="3" fill="#FFFFFF"/>
    <rect x="-26" y="-8" width="10" height="16" rx="3" fill="#FFFFFF"/>
    <rect x="16" y="-8" width="10" height="16" rx="3" fill="#FFFFFF"/>
  </g>
  <!-- AI: 4-point star -->
  <polygon transform="translate(332, 302)" points="0,-14 3,-3 14,0 3,3 0,14 -3,3 -14,0 -3,-3" fill="#FFFFFF" opacity="0.5"/>

  <!-- White center overlap mark -->
  <circle cx="256" cy="268" r="28" fill="#FFFFFF"/>
</svg>
