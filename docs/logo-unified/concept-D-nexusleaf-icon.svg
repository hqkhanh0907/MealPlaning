<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="nl-title nl-desc">
  <title id="nl-title">Smart Meal Planner — NexusLeaf</title>
  <desc id="nl-desc">A single leaf whose stem is a person silhouette with arms raised, three veins carry unique pillar symbols, and a radiant AI crown at the tip</desc>
  <defs>
    <linearGradient id="nl-body" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="35%" stop-color="#059669"/>
      <stop offset="65%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="nl-crown" cx="50%" cy="0%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#A7F3D0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="nl-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0FDF4"/><stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#nl-bg)"/>

  <!-- Main leaf shape -->
  <path d="M256 68
           C355 135, 408 225, 392 320
           C382 378, 345 418, 300 438
           C280 446, 268 448, 256 449
           C244 448, 232 446, 212 438
           C167 418, 130 378, 120 320
           C104 225, 157 135, 256 68Z"
        fill="url(#nl-body)"/>

  <!-- STEM = PERSON SILHOUETTE (celebrating/exercising) -->
  <g transform="translate(256, 340)" fill="#FFFFFF" opacity="0.55">
    <!-- Head -->
    <circle cx="0" cy="-55" r="14"/>
    <!-- Body -->
    <rect x="-5" y="-40" width="10" height="48" rx="5"/>
    <!-- Left arm raised -->
    <path d="M-5,-35 L-28,-58 L-22,-62" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right arm raised -->
    <path d="M5,-35 L28,-58 L22,-62" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Left leg -->
    <path d="M-3,8 L-16,38" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- Right leg -->
    <path d="M3,8 L16,38" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- LEFT VEIN: MEAL — with tiny fork tine hints -->
  <path d="M256 180
           C230 210, 200 250, 185 290
           C175 315, 168 335, 160 360"
        fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.45" stroke-linecap="round"/>
  <!-- Fork tines at end -->
  <g transform="translate(160, 362) rotate(20)">
    <line x1="-6" y1="0" x2="-6" y2="14" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="16" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="6" y1="0" x2="6" y2="14" stroke="#FFFFFF" stroke-width="2.2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- CENTER VEIN: FITNESS — strong, direct upward -->
  <line x1="256" y1="180" x2="256" y2="420" stroke="#FFFFFF" stroke-width="3.5" opacity="0.5" stroke-linecap="round"/>

  <!-- RIGHT VEIN: AI — with neural branch nodes -->
  <path d="M256 180
           C282 210, 312 250, 327 290
           C337 315, 344 335, 352 360"
        fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.45" stroke-linecap="round"/>
  <!-- Neural nodes -->
  <circle cx="310" cy="248" r="4" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="335" cy="305" r="4" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="348" cy="345" r="3.5" fill="#FFFFFF" opacity="0.35"/>
  <!-- Branch connections -->
  <line x1="310" y1="248" x2="325" y2="240" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="335" y1="305" x2="352" y2="298" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="348" y1="345" x2="363" y2="340" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>

  <!-- AI CROWN at top — radiant sparkle convergence -->
  <circle cx="256" cy="100" r="35" fill="url(#nl-crown)"/>
  <circle cx="256" cy="100" r="12" fill="#FFFFFF"/>
  <!-- 4-point sparkle -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round">
    <line x1="256" y1="78" x2="256" y2="66"/>
    <line x1="256" y1="122" x2="256" y2="134"/>
    <line x1="234" y1="100" x2="222" y2="100"/>
    <line x1="278" y1="100" x2="290" y2="100"/>
  </g>
  <!-- Diagonal rays -->
  <g stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.55">
    <line x1="242" y1="86" x2="234" y2="78"/>
    <line x1="270" y1="86" x2="278" y2="78"/>
    <line x1="242" y1="114" x2="234" y2="122"/>
    <line x1="270" y1="114" x2="278" y2="122"/>
  </g>
</svg>
