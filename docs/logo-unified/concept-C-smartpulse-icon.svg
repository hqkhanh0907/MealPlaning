<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="sp-title sp-desc">
  <title id="sp-title">Smart Meal Planner — SmartPulse</title>
  <desc id="sp-desc">A circular mark with a vitality pulse line whose three peaks form a leaf, a strength peak, and an AI node</desc>
  <defs>
    <linearGradient id="sp-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="sp-pulse" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.3"/>
      <stop offset="20%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#059669"/>
      <stop offset="80%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/><stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <radialGradient id="sp-inner-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#D1FAE5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#sp-bg)"/>

  <!-- Outer circle ring -->
  <circle cx="256" cy="256" r="175" fill="none" stroke="url(#sp-ring)" stroke-width="10"/>

  <!-- Inner subtle glow -->
  <circle cx="256" cy="256" r="165" fill="url(#sp-inner-glow)"/>

  <!-- THE PULSE LINE — three peaks, each representing a pillar -->
  <path d="M82 270
           L140 270
           C148 270, 152 268, 156 260
           L168 228
           C170 224, 172 226, 172 226
           L180 242
           C182 246, 184 244, 186 240
           L195 205
           C198 196, 200 194, 202 196
           L210 240
           L218 268
           C220 272, 222 270, 224 266
           L238 222
           L248 190
           L256 148
           L264 190
           L274 222
           C276 228, 278 228, 280 222
           L292 180
           L300 158
           L308 180
           L316 210
           C318 216, 320 216, 322 210
           L328 188
           L332 198
           C333 200, 335 200, 336 196
           L340 208
           L344 220
           C346 225, 347 224, 348 222
           L356 240
           L362 258
           C364 264, 366 268, 370 270
           L430 270"
        fill="none" stroke="url(#sp-pulse)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- PEAK 1 LABEL: Meal (Left peak — leaf shape at top) -->
  <g transform="translate(200, 192)">
    <path d="M0,-8 C4,-6, 6,-2, 5,2 C4,5, 2,7, 0,8 C-2,7, -4,5, -5,2 C-6,-2, -4,-6, 0,-8Z"
          fill="#10B981" opacity="0.6"/>
  </g>

  <!-- PEAK 2 LABEL: Fitness (Center peak — tallest, strongest) -->
  <!-- The center peak IS the tallest point at y=148, naturally conveying strength -->

  <!-- PEAK 3 LABEL: AI (Right peak — sparkle node) -->
  <g transform="translate(300, 152)">
    <circle cx="0" cy="0" r="6" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <!-- Tiny sparkle rays -->
    <g stroke="#10B981" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
      <line x1="0" y1="-10" x2="0" y2="-14"/>
      <line x1="0" y1="10" x2="0" y2="14"/>
      <line x1="-10" y1="0" x2="-14" y2="0"/>
      <line x1="10" y1="0" x2="14" y2="0"/>
    </g>
  </g>

  <!-- Center bottom: three small pillar dots -->
  <g transform="translate(256, 368)">
    <circle cx="-20" cy="0" r="6" fill="#10B981" opacity="0.7"/>
    <circle cx="0" cy="0" r="6" fill="#0D9488" opacity="0.55"/>
    <circle cx="20" cy="0" r="6" fill="#34D399" opacity="0.45"/>
  </g>

  <!-- Subtle label text at bottom -->
  <g transform="translate(256, 405)" text-anchor="middle">
    <text font-family="'SF Pro Display','Inter','Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#10B981" letter-spacing="5" opacity="0.5">MEAL · FIT · AI</text>
  </g>
</svg>
