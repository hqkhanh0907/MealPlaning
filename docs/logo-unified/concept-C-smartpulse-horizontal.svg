<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180" role="img" aria-labelledby="spH-title">
  <title id="spH-title">Smart Meal Planner — SmartPulse Horizontal</title>
  <defs>
    <linearGradient id="spH-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="spH-pulse" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.3"/><stop offset="25%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#059669"/><stop offset="75%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Circle + pulse icon -->
  <g transform="translate(72, 90)">
    <circle cx="0" cy="0" r="58" fill="none" stroke="url(#spH-ring)" stroke-width="4"/>
    <!-- Pulse line -->
    <path d="M-55,4 L-35,4 L-25,-5 L-18,8 L-12,-15 L-5,4
             L5,4 L10,-8 L15,-30 L20,-8 L28,4
             L33,-18 L37,-28 L41,-18 L45,0 L48,4 L55,4"
          fill="none" stroke="url(#spH-pulse)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left leaf at first peak -->
    <path d="M-12,-15 C-10,-19 -8,-18 -9,-14 C-10,-12 -11,-11 -12,-15Z" fill="#10B981" opacity="0.5"/>
    <!-- Right AI sparkle at third peak -->
    <circle cx="37" cy="-28" r="3.5" fill="#FFF" stroke="#10B981" stroke-width="1.2"/>
    <g stroke="#10B981" stroke-width="1" stroke-linecap="round" opacity="0.5">
      <line x1="37" y1="-34" x2="37" y2="-37"/><line x1="37" y1="-22" x2="37" y2="-19"/>
      <line x1="31" y1="-28" x2="28" y2="-28"/><line x1="43" y1="-28" x2="46" y2="-28"/>
    </g>
    <!-- Three pillar dots -->
    <circle cx="-8" cy="32" r="3" fill="#10B981" opacity="0.6"/>
    <circle cx="0" cy="32" r="3" fill="#0D9488" opacity="0.45"/>
    <circle cx="8" cy="32" r="3" fill="#34D399" opacity="0.35"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(175, 0)">
    <text x="0" y="78" font-family="'SF Pro Display','Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" letter-spacing="-1">
      <tspan fill="#10B981">Smart</tspan><tspan fill="#1E293B" dx="4">Meal</tspan>
    </text>
    <text x="0" y="118" font-family="'SF Pro Display','Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="#64748B" letter-spacing="4.5">PLANNER</text>
  </g>
</svg>
