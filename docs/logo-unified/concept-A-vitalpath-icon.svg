<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="vp-title vp-desc">
  <title id="vp-title">Smart Meal Planner — VitalPath</title>
  <desc id="vp-desc">A leaf-shaped mark containing three rising paths representing meal planning, fitness, and AI intelligence converging at a radiant point</desc>
  <defs>
    <linearGradient id="vp-body" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="45%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="vp-path-meal" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="vp-path-fit" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="vp-path-ai" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="vp-glow" cx="50%" cy="18%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#A7F3D0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#vp-bg)"/>

  <!-- Main leaf/shield body -->
  <path d="M256 72
           C348 132, 400 212, 388 308
           C380 368, 340 412, 296 432
           C276 440, 266 442, 256 443
           C246 442, 236 440, 216 432
           C172 412, 132 368, 124 308
           C112 212, 164 132, 256 72Z"
        fill="url(#vp-body)"/>

  <!-- PATH 1 (Left): MEAL PLANNING — fork-like curve -->
  <path d="M200 390
           C195 355, 195 325, 200 295
           C208 258, 218 235, 222 210
           C226 190, 235 168, 245 145
           L256 118"
        fill="none" stroke="url(#vp-path-meal)" stroke-width="5.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Fork tine hint at base -->
  <path d="M190 395 C192 378, 194 368, 196 358"
        fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
  <path d="M210 395 C208 378, 205 365, 204 352"
        fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.35"/>

  <!-- PATH 2 (Center): FITNESS — strong upward line with peak -->
  <path d="M256 405
           L256 340
           L256 280
           L248 245
           L264 210
           L250 175
           L256 118"
        fill="none" stroke="url(#vp-path-fit)" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- PATH 3 (Right): AI — branching neural path -->
  <path d="M312 390
           C317 355, 317 325, 312 295
           C304 258, 294 235, 290 210
           C286 190, 277 168, 267 145
           L256 118"
        fill="none" stroke="url(#vp-path-ai)" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI branch nodes -->
  <circle cx="315" cy="320" r="4" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="305" cy="265" r="3.5" fill="#FFFFFF" opacity="0.45"/>
  <line x1="315" y1="320" x2="326" y2="310" stroke="#FFFFFF" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  <line x1="305" y1="265" x2="320" y2="258" stroke="#FFFFFF" stroke-width="2" opacity="0.3" stroke-linecap="round"/>

  <!-- Convergence point (top) — radiant AI sparkle -->
  <circle cx="256" cy="110" r="28" fill="url(#vp-glow)"/>
  <circle cx="256" cy="110" r="10" fill="#FFFFFF"/>
  <!-- 4-point sparkle -->
  <g stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.85">
    <line x1="256" y1="92" x2="256" y2="82"/>
    <line x1="256" y1="128" x2="256" y2="138"/>
    <line x1="238" y1="110" x2="228" y2="110"/>
    <line x1="274" y1="110" x2="284" y2="110"/>
  </g>
  <!-- Small diagonal sparkle rays -->
  <g stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.5">
    <line x1="244" y1="98" x2="238" y2="92"/>
    <line x1="268" y1="98" x2="274" y2="92"/>
    <line x1="244" y1="122" x2="238" y2="128"/>
    <line x1="268" y1="122" x2="274" y2="128"/>
  </g>
</svg>
