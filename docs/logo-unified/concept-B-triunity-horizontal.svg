<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180" role="img" aria-labelledby="tuH-title">
  <title id="tuH-title">Smart Meal Planner — TriUnity Horizontal</title>
  <defs>
    <linearGradient id="tuH-meal" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="tuH-fit" x1="100%" y1="30%" x2="0%" y2="70%">
      <stop offset="0%" stop-color="#0D9488"/><stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="tuH-ai" x1="0%" y1="30%" x2="100%" y2="70%">
      <stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
  </defs>

  <!-- TriUnity icon scaled -->
  <g transform="translate(75, 90) scale(0.17)">
    <!-- Petal 1 Meal -->
    <path d="M0,-330 C62,-270, 110,-195, 102,-120 C96,-75, 70,-40, 38,-20 C19,-9, 0,0, 0,0 C0,0, -19,-9, -38,-20 C-70,-40, -96,-75, -102,-120 C-110,-195, -62,-270, 0,-330Z" fill="url(#tuH-meal)" opacity="0.88"/>
    <line x1="0" y1="-260" x2="0" y2="-35" stroke="#FFF" stroke-width="3.5" opacity="0.45" stroke-linecap="round"/>
    <!-- Petal 2 Fitness -->
    <path d="M-172,200 C-198,162, -210,110, -196,62 C-188,25, -162,0, -130,-18 C-100,-32, -60,-28, -12,0 C6,16, 10,40, 3,62 C-10,108, -42,165, -85,192 C-130,215, -160,212, -172,200Z" fill="url(#tuH-fit)" opacity="0.82"/>
    <g transform="translate(-100, 80) rotate(-30)">
      <rect x="-16" y="-3" width="32" height="5" rx="2.5" fill="#FFF" opacity="0.4"/>
      <rect x="-20" y="-6" width="7" height="11" rx="2.5" fill="#FFF" opacity="0.4"/>
      <rect x="13" y="-6" width="7" height="11" rx="2.5" fill="#FFF" opacity="0.4"/>
    </g>
    <!-- Petal 3 AI -->
    <path d="M172,200 C198,162, 210,110, 196,62 C188,25, 162,0, 130,-18 C100,-32, 60,-28, 12,0 C-6,16, -10,40, -3,62 C10,108, 42,165, 85,192 C130,215, 160,212, 172,200Z" fill="url(#tuH-ai)" opacity="0.78"/>
    <g transform="translate(102, 75)">
      <circle cx="0" cy="0" r="6" fill="#FFF" opacity="0.5"/>
      <circle cx="-16" cy="-18" r="4" fill="#FFF" opacity="0.35"/>
      <circle cx="14" cy="-20" r="4" fill="#FFF" opacity="0.35"/>
      <line x1="0" y1="0" x2="-16" y2="-18" stroke="#FFF" stroke-width="2" opacity="0.25"/>
      <line x1="0" y1="0" x2="14" y2="-20" stroke="#FFF" stroke-width="2" opacity="0.25"/>
    </g>
    <!-- Center -->
    <circle cx="0" cy="18" r="35" fill="#FFF" opacity="0.92"/>
    <circle cx="0" cy="18" r="24" fill="#10B981"/>
    <g stroke="#FFF" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="8" x2="0" y2="28"/><line x1="-10" y1="18" x2="10" y2="18"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(175, 0)">
    <text x="0" y="78" font-family="'SF Pro Display','Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" letter-spacing="-1">
      <tspan fill="#10B981">Smart</tspan><tspan fill="#1E293B" dx="4">Meal</tspan>
    </text>
    <text x="0" y="118" font-family="'SF Pro Display','Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="#64748B" letter-spacing="4.5">PLANNER</text>
  </g>
</svg>
