<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" width="640" height="180" role="img" aria-labelledby="nlH-title">
  <title id="nlH-title">Smart Meal Planner — NexusLeaf Horizontal</title>
  <defs>
    <linearGradient id="nlH-body" x1="25%" y1="0%" x2="75%" y2="100%">
      <stop offset="0%" stop-color="#047857"/><stop offset="35%" stop-color="#059669"/><stop offset="65%" stop-color="#10B981"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="nlH-crown" cx="50%" cy="0%" r="40%">
      <stop offset="0%" stop-color="#FFF" stop-opacity="1"/><stop offset="50%" stop-color="#A7F3D0" stop-opacity="0.4"/><stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- NexusLeaf icon -->
  <g transform="translate(75, 90) scale(0.185)">
