  <!-- Wordmark -->
  <g transform="translate(175, 0)">
    <text x="0" y="78" font-family="'SF Pro Display','Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="800" letter-spacing="-1">
      <tspan fill="#10B981">Smart</tspan><tspan fill="#1E293B" dx="4">Meal</tspan>
    </text>
    <text x="0" y="118" font-family="'SF Pro Display','Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="17" font-weight="500" fill="#64748B" letter-spacing="4.5">PLANNER</text>
