    <path d="M0,-380 C160,-270, 245,-130, 220,60 C204,155, 144,260, 70,295 C38,310, 0,318, 0,318 C0,318, -38,310, -70,295 C-144,260, -204,155, -220,60 C-245,-130, -160,-270, 0,-380Z" fill="url(#nlH-body)"/>
    <!-- Person stem -->
    <g fill="#FFF" opacity="0.5">
      <circle cx="0" cy="55" r="18"/>
      <rect x="-7" y="75" width="14" height="60" rx="7"/>
      <path d="M-7,82 L-38,52 L-30,46" stroke="#FFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M7,82 L38,52 L30,46" stroke="#FFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M-4,135 L-22,180" stroke="#FFF" stroke-width="10" stroke-linecap="round" fill="none"/>
      <path d="M4,135 L22,180" stroke="#FFF" stroke-width="10" stroke-linecap="round" fill="none"/>
    </g>
    <!-- Left vein meal -->
    <path d="M0,-180 C-42,-130, -90,-50, -115,30 C-128,65, -138,95, -148,130" fill="none" stroke="#FFF" stroke-width="4" opacity="0.4" stroke-linecap="round"/>
    <g transform="translate(-148, 135) rotate(20)">
      <line x1="-7" y1="0" x2="-7" y2="16" stroke="#FFF" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
      <line x1="0" y1="0" x2="0" y2="18" stroke="#FFF" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
      <line x1="7" y1="0" x2="7" y2="16" stroke="#FFF" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
    </g>
    <!-- Center vein fitness -->
    <line x1="0" y1="-180" x2="0" y2="280" stroke="#FFF" stroke-width="5" opacity="0.45" stroke-linecap="round"/>
    <!-- Right vein AI -->
    <path d="M0,-180 C42,-130, 90,-50, 115,30 C128,65, 138,95, 148,130" fill="none" stroke="#FFF" stroke-width="4" opacity="0.4" stroke-linecap="round"/>
    <circle cx="85" cy="-55" r="5.5" fill="#FFF" opacity="0.4"/>
    <circle cx="125" cy="55" r="5.5" fill="#FFF" opacity="0.35"/>
    <line x1="85" y1="-55" x2="102" y2="-66" stroke="#FFF" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
    <line x1="125" y1="55" x2="145" y2="45" stroke="#FFF" stroke-width="2" opacity="0.25" stroke-linecap="round"/>
    <!-- Crown -->
    <circle cx="0" cy="-340" r="50" fill="url(#nlH-crown)"/>
    <circle cx="0" cy="-340" r="18" fill="#FFF"/>
    <g stroke="#FFF" stroke-width="4.5" stroke-linecap="round">
      <line x1="0" y1="-368" x2="0" y2="-385"/><line x1="0" y1="-312" x2="0" y2="-295"/>
      <line x1="-28" y1="-340" x2="-45" y2="-340"/><line x1="28" y1="-340" x2="45" y2="-340"/>
    </g>
