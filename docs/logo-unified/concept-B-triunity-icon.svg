<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="tu-title tu-desc">
  <title id="tu-title">Smart Meal Planner — TriUnity</title>
  <desc id="tu-desc">Three overlapping petals forming a unified trinity: nutrition leaf, fitness figure, and AI sparkle</desc>
  <defs>
    <linearGradient id="tu-meal" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="tu-fit" x1="100%" y1="30%" x2="0%" y2="70%">
      <stop offset="0%" stop-color="#0D9488"/><stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="tu-ai" x1="0%" y1="30%" x2="100%" y2="70%">
      <stop offset="0%" stop-color="#34D399"/><stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <linearGradient id="tu-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/><stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#tu-bg)"/>

  <!-- PETAL 1 (Top): MEAL / NUTRITION — Leaf shape pointing up -->
  <path d="M256 75
           C295 105, 325 155, 320 210
           C316 235, 300 268, 280 280
           C268 288, 256 290, 256 290
           C256 290, 244 288, 232 280
           C212 268, 196 235, 192 210
           C187 155, 217 105, 256 75Z"
        fill="url(#tu-meal)" opacity="0.88"/>
  <!-- Leaf vein -->
  <line x1="256" y1="110" x2="256" y2="268" stroke="#FFFFFF" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M256 170 C242 185, 228 200, 222 220" stroke="#FFFFFF" stroke-width="1.8" opacity="0.35" fill="none" stroke-linecap="round"/>
  <path d="M256 170 C270 185, 284 200, 290 220" stroke="#FFFFFF" stroke-width="1.8" opacity="0.35" fill="none" stroke-linecap="round"/>

  <!-- PETAL 2 (Bottom-Left): FITNESS — Teardrop with movement energy -->
  <path d="M148 420
           C128 390, 115 350, 125 310
           C130 280, 150 260, 175 245
           C195 232, 225 238, 248 260
           C260 272, 262 290, 258 305
           C252 340, 230 380, 200 410
           C180 440, 158 435, 148 420Z"
        fill="url(#tu-fit)" opacity="0.82"/>
  <!-- Dumbbell hint inside -->
  <g transform="translate(192, 340) rotate(-30)">
    <rect x="-18" y="-3" width="36" height="6" rx="3" fill="#FFFFFF" opacity="0.45"/>
    <rect x="-22" y="-7" width="8" height="14" rx="3" fill="#FFFFFF" opacity="0.45"/>
    <rect x="14" y="-7" width="8" height="14" rx="3" fill="#FFFFFF" opacity="0.45"/>
  </g>

  <!-- PETAL 3 (Bottom-Right): AI — Teardrop with neural energy -->
  <path d="M364 420
           C384 390, 397 350, 387 310
           C382 280, 362 260, 337 245
           C317 232, 287 238, 264 260
           C252 272, 250 290, 254 305
           C260 340, 282 380, 312 410
           C332 440, 354 435, 364 420Z"
        fill="url(#tu-ai)" opacity="0.78"/>
  <!-- AI sparkle/nodes inside -->
  <g transform="translate(320, 340)">
    <circle cx="0" cy="0" r="5" fill="#FFFFFF" opacity="0.55"/>
    <circle cx="-15" cy="-18" r="3.5" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="12" cy="-20" r="3.5" fill="#FFFFFF" opacity="0.4"/>
    <circle cx="18" cy="8" r="3" fill="#FFFFFF" opacity="0.35"/>
    <line x1="0" y1="0" x2="-15" y2="-18" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="12" y2="-20" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="18" y2="8" stroke="#FFFFFF" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- CENTER OVERLAP — Heart/convergence point -->
  <circle cx="256" cy="295" r="26" fill="#FFFFFF" opacity="0.92"/>
  <circle cx="256" cy="295" r="18" fill="#10B981"/>
  <!-- Plus/cross in center = health -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round">
    <line x1="256" y1="287" x2="256" y2="303"/>
    <line x1="248" y1="295" x2="264" y2="295"/>
  </g>
</svg>
