<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-labelledby="title5h">
  <title id="title5h">Smart Meal Planner - AI Tech Forward Horizontal</title>
  <defs>
    <radialGradient id="ai-h-glow" r="60%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="160" rx="16" fill="#0F172A"/>

  <!-- Network icon -->
  <g transform="translate(72, 80)">
    <!-- Connections -->
    <g stroke="#10B981" stroke-width="1.5" opacity="0.4">
      <line x1="0" y1="-50" x2="-28" y2="-18"/>
      <line x1="0" y1="-50" x2="28" y2="-18"/>
      <line x1="-28" y1="-18" x2="0" y2="8"/>
      <line x1="28" y1="-18" x2="0" y2="8"/>
      <line x1="-28" y1="-18" x2="-38" y2="25"/>
      <line x1="28" y1="-18" x2="38" y2="25"/>
      <line x1="0" y1="8" x2="-20" y2="42"/>
      <line x1="0" y1="8" x2="20" y2="42"/>
      <line x1="-38" y1="25" x2="-20" y2="42"/>
      <line x1="38" y1="25" x2="20" y2="42"/>
      <line x1="-20" y1="42" x2="0" y2="55"/>
      <line x1="20" y1="42" x2="0" y2="55"/>
    </g>
    <!-- Bright center line -->
    <line x1="0" y1="-50" x2="0" y2="55" stroke="#34D399" stroke-width="1.5" opacity="0.5"/>

    <!-- Nodes -->
    <circle cx="0" cy="-50" r="7" fill="#10B981"/>
    <circle cx="0" cy="-50" r="3" fill="#0F172A"/>
    <circle cx="-28" cy="-18" r="5" fill="#10B981" opacity="0.9"/>
    <circle cx="28" cy="-18" r="5" fill="#10B981" opacity="0.9"/>
    <circle cx="0" cy="8" r="9" fill="#10B981"/>
    <circle cx="0" cy="8" r="5" fill="#0F172A"/>
    <path d="M0,4 C2,2 4,3 3.5,6 C3,8 1,9 0,9.5 C-1,9 -3,8 -3.5,6 C-4,3 -2,2 0,4Z" fill="#34D399"/>
    <circle cx="-38" cy="25" r="4" fill="#0D9488" opacity="0.8"/>
    <circle cx="38" cy="25" r="4" fill="#0D9488" opacity="0.8"/>
    <circle cx="-20" cy="42" r="4" fill="#0D9488" opacity="0.7"/>
    <circle cx="20" cy="42" r="4" fill="#0D9488" opacity="0.7"/>
    <circle cx="0" cy="55" r="5" fill="#10B981" opacity="0.8"/>
  </g>

  <!-- Wordmark on dark -->
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#34D399" letter-spacing="-0.5">Smart</text>
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#E2E8F0" letter-spacing="-0.5" dx="105">Meal</text>
  <text x="160" y="110" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#64748B" letter-spacing="3">PLANNER</text>
</svg>
