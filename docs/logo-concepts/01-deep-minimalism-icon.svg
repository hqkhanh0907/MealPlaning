<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title1 desc1">
  <title id="title1">Smart Meal Planner - Deep Minimalism</title>
  <desc id="desc1">A minimalist leaf with three vein lines representing macronutrients and a glowing dot at the tip</desc>
  <defs>
    <linearGradient id="dm-grad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="dm-glow" cx="50%" cy="15%" r="20%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#dm-bg)"/>

  <!-- Main leaf shape -->
  <path d="M256 80 C340 140, 390 220, 370 310 C355 375, 310 420, 256 432 C202 420, 157 375, 142 310 C122 220, 172 140, 256 80Z"
        fill="url(#dm-grad)" stroke="none"/>

  <!-- Three macro vein lines (Protein / Carbs / Fat) -->
  <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85">
    <!-- Central vein (Protein) -->
    <path d="M256 130 L256 370"/>
    <!-- Left vein (Carbs) -->
    <path d="M256 200 C230 230, 200 260, 185 300"/>
    <!-- Right vein (Fat) -->
    <path d="M256 200 C282 230, 312 260, 327 300"/>
  </g>

  <!-- AI Smart dot at tip -->
  <circle cx="256" cy="105" r="12" fill="#FFFFFF" opacity="0.95"/>
  <circle cx="256" cy="105" r="20" fill="url(#dm-glow)"/>
</svg>
