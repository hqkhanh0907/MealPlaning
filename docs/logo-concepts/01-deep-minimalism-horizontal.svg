<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-labelledby="title1h desc1h">
  <title id="title1h">Smart Meal Planner - Deep Minimalism Horizontal</title>
  <desc id="desc1h">NutriLeaf logo with wordmark</desc>
  <defs>
    <linearGradient id="dm-h-grad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="dm-h-glow" cx="50%" cy="15%" r="25%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Leaf icon -->
  <g transform="translate(10, 8) scale(0.28)">
    <path d="M256 80 C340 140, 390 220, 370 310 C355 375, 310 420, 256 432 C202 420, 157 375, 142 310 C122 220, 172 140, 256 80Z"
          fill="url(#dm-h-grad)"/>
    <g stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" fill="none" opacity="0.85">
      <path d="M256 130 L256 370"/>
      <path d="M256 200 C230 230, 200 260, 185 300"/>
      <path d="M256 200 C282 230, 312 260, 327 300"/>
    </g>
    <circle cx="256" cy="105" r="14" fill="#FFFFFF" opacity="0.95"/>
    <circle cx="256" cy="105" r="22" fill="url(#dm-h-glow)"/>
  </g>

  <!-- Wordmark -->
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#10B981" letter-spacing="-0.5">Smart</text>
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#1E293B" letter-spacing="-0.5" dx="105">Meal</text>
  <text x="160" y="110" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#64748B" letter-spacing="3">PLANNER</text>
</svg>
