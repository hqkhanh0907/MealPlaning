<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-labelledby="title9h">
  <title id="title9h">Smart Meal Planner - Animated Motion Horizontal</title>
  <defs>
    <linearGradient id="mo-h-grad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="50%" stop-color="#10B981"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>
  <g transform="translate(72, 80)">
    <circle cx="0" cy="5" r="60" fill="none" stroke="#10B981" stroke-width="1" opacity="0.12">
      <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.12;0.04;0.12" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="5" r="50" fill="none" stroke="#10B981" stroke-width="0.8" opacity="0.18">
      <animate attributeName="r" values="48;55;48" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.18;0.06;0.18" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-2;0,0" dur="4s" repeatCount="indefinite"/>
      <path d="M0,-50 C28,-28, 42,-2, 37,28 C32,48, 16,60, 0,63 C-16,60, -32,48, -37,28 C-42,-2, -28,-28, 0,-50Z" fill="url(#mo-h-grad)"/>
      <g stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8">
        <line x1="0" y1="-35" x2="0" y2="52"/>
        <path d="M0,-8 C-10,5 -20,18 -24,30"/>
        <path d="M0,-8 C10,5 20,18 24,30"/>
      </g>
      <circle cx="0" cy="-40" r="5" fill="#FFFFFF" opacity="0.9">
        <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    <circle cx="30" cy="-25" r="2" fill="#34D399">
      <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-28" cy="0" r="1.5" fill="#34D399">
      <animate attributeName="opacity" values="0;0.5;0" dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="160" y="72" font-family="'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#10B981" letter-spacing="-0.5">Smart</text>
  <text x="160" y="72" font-family="'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="36" font-weight="700" fill="#1E293B" letter-spacing="-0.5" dx="105">Meal</text>
  <text x="160" y="110" font-family="'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="400" fill="#64748B" letter-spacing="3">PLANNER</text>
</svg>
