<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title5 desc5">
  <title id="title5">Smart Meal Planner - AI Tech Forward</title>
  <desc id="desc5">Neural network nodes forming a leaf shape, suggesting AI-powered nutrition analysis</desc>
  <defs>
    <linearGradient id="ai-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <radialGradient id="ai-node-glow" r="60%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
    <filter id="ai-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="#0F172A"/>

  <!-- Subtle glow behind network -->
  <ellipse cx="256" cy="256" rx="160" ry="180" fill="#10B981" opacity="0.06" filter="url(#ai-blur)"/>

  <!-- Connection lines -->
  <g stroke="#10B981" stroke-width="2" opacity="0.4">
    <!-- Outer connections -->
    <line x1="256" y1="100" x2="170" y2="190"/>
    <line x1="256" y1="100" x2="342" y2="190"/>
    <line x1="170" y1="190" x2="140" y2="300"/>
    <line x1="342" y1="190" x2="372" y2="300"/>
    <line x1="170" y1="190" x2="256" y2="260"/>
    <line x1="342" y1="190" x2="256" y2="260"/>
    <line x1="140" y1="300" x2="256" y2="260"/>
    <line x1="372" y1="300" x2="256" y2="260"/>
    <line x1="140" y1="300" x2="210" y2="380"/>
    <line x1="372" y1="300" x2="302" y2="380"/>
    <line x1="256" y1="260" x2="210" y2="380"/>
    <line x1="256" y1="260" x2="302" y2="380"/>
    <line x1="210" y1="380" x2="256" y2="420"/>
    <line x1="302" y1="380" x2="256" y2="420"/>
  </g>

  <!-- Active connection lines (brighter) -->
  <g stroke="#34D399" stroke-width="2.5" opacity="0.7">
    <line x1="256" y1="100" x2="256" y2="260"/>
    <line x1="256" y1="260" x2="256" y2="420"/>
    <line x1="170" y1="190" x2="342" y2="190"/>
  </g>

  <!-- Node glows -->
  <g>
    <circle cx="256" cy="100" r="25" fill="url(#ai-node-glow)"/>
    <circle cx="256" cy="260" r="30" fill="url(#ai-node-glow)"/>
  </g>

  <!-- Nodes -->
  <g>
    <!-- Top node (AI brain) -->
    <circle cx="256" cy="100" r="16" fill="#10B981"/>
    <circle cx="256" cy="100" r="8" fill="#0F172A"/>
    <circle cx="256" cy="100" r="4" fill="#34D399"/>

    <!-- Layer 1 nodes -->
    <circle cx="170" cy="190" r="12" fill="#10B981" opacity="0.9"/>
    <circle cx="170" cy="190" r="5" fill="#0F172A"/>
    <circle cx="342" cy="190" r="12" fill="#10B981" opacity="0.9"/>
    <circle cx="342" cy="190" r="5" fill="#0F172A"/>

    <!-- Center node (large, main processor) -->
    <circle cx="256" cy="260" r="20" fill="#10B981"/>
    <circle cx="256" cy="260" r="12" fill="#0F172A"/>
    <!-- Leaf symbol in center -->
    <path d="M256,250 C260,245 264,248 263,254 C262,258 258,262 256,263 C254,262 250,258 249,254 C248,248 252,245 256,250Z"
          fill="#34D399"/>

    <!-- Layer 2 nodes -->
    <circle cx="140" cy="300" r="10" fill="#0D9488" opacity="0.8"/>
    <circle cx="140" cy="300" r="4" fill="#0F172A"/>
    <circle cx="372" cy="300" r="10" fill="#0D9488" opacity="0.8"/>
    <circle cx="372" cy="300" r="4" fill="#0F172A"/>

    <!-- Bottom layer -->
    <circle cx="210" cy="380" r="10" fill="#0D9488" opacity="0.7"/>
    <circle cx="210" cy="380" r="4" fill="#0F172A"/>
    <circle cx="302" cy="380" r="10" fill="#0D9488" opacity="0.7"/>
    <circle cx="302" cy="380" r="4" fill="#0F172A"/>

    <!-- Bottom node -->
    <circle cx="256" cy="420" r="12" fill="#10B981" opacity="0.8"/>
    <circle cx="256" cy="420" r="5" fill="#0F172A"/>
  </g>
</svg>
