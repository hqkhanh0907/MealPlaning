<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-labelledby="title7h">
  <title id="title7h">Smart Meal Planner - Gradient Glass Horizontal</title>
  <defs>
    <linearGradient id="gl-h-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064E3B"/><stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="gl-h-drop" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/><stop offset="50%" stop-color="#10B981"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="gl-h-shine" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="gl-h-shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#10B981" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="160" rx="16" fill="url(#gl-h-bg)"/>

  <!-- Drop icon -->
  <g transform="translate(72, 80)" filter="url(#gl-h-shadow)">
    <path d="M0,-55 C0,-55 38,5 38,35 C38,56 21,68 0,68 C-21,68 -38,56 -38,35 C-38,5 0,-55 0,-55Z" fill="url(#gl-h-drop)"/>
    <path d="M0,-55 C0,-55 38,5 38,35 C38,56 21,68 0,68 C-21,68 -38,56 -38,35 C-38,5 0,-55 0,-55Z" fill="url(#gl-h-shine)"/>
    <!-- Diamond -->
    <path d="M0,18 L10,30 L0,45 L-10,30 Z" fill="#FFFFFF" opacity="0.2" stroke="#FFFFFF" stroke-width="0.8" stroke-opacity="0.4"/>
  </g>

  <!-- Wordmark on dark -->
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#34D399" letter-spacing="-0.5">Smart</text>
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#E2E8F0" letter-spacing="-0.5" dx="105">Meal</text>
  <text x="160" y="110" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#64748B" letter-spacing="3">PLANNER</text>
</svg>
