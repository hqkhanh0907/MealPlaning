<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title9 desc9">
  <title id="title9">Smart Meal Planner - Animated Motion (Static Preview)</title>
  <desc id="desc9">A pulsing leaf with animated rings showing the motion logo concept</desc>
  <defs>
    <linearGradient id="mo-grad" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="50%" stop-color="#10B981"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="mo-pulse1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.15"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mo-pulse2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.08"/><stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="102" fill="#FFFFFF"/>
  <circle cx="256" cy="270" r="210" fill="url(#mo-pulse2)">
    <animate attributeName="r" values="180;210;180" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="270" r="170" fill="url(#mo-pulse1)">
    <animate attributeName="r" values="150;175;150" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="270" r="155" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.15">
    <animate attributeName="r" values="155;175;155" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0.05;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="256" cy="270" r="130" fill="none" stroke="#10B981" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="130;145;130" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.08;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <g>
    <path d="M256 100 C340 155, 385 225, 368 310 C354 370, 310 410, 256 420 C202 410, 158 370, 144 310 C127 225, 172 155, 256 100Z" fill="url(#mo-grad)"/>
    <g stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.8">
      <path d="M256 150 L256 370">
        <animate attributeName="stroke-dasharray" values="0,220;220,0" dur="2s" fill="freeze"/>
      </path>
      <path d="M256 215 C230 240, 200 270, 188 305">
        <animate attributeName="stroke-dasharray" values="0,120;120,0" dur="2s" begin="0.5s" fill="freeze"/>
      </path>
      <path d="M256 215 C282 240, 312 270, 324 305">
        <animate attributeName="stroke-dasharray" values="0,120;120,0" dur="2s" begin="0.5s" fill="freeze"/>
      </path>
    </g>
    <circle cx="256" cy="125" r="12" fill="#FFFFFF" opacity="0.95">
      <animate attributeName="r" values="10;14;10" dur="2s" repeatCount="indefinite"/>
    </circle>
    <g>
      <circle cx="330" cy="180" r="3" fill="#34D399" opacity="0">
        <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="185;165;185" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="180" cy="220" r="2.5" fill="#34D399" opacity="0">
        <animate attributeName="opacity" values="0;0.6;0" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="225;205;225" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="350" cy="280" r="2" fill="#6EE7B7" opacity="0">
        <animate attributeName="opacity" values="0;0.5;0" dur="2.8s" begin="1s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="285;265;285" dur="2.8s" begin="1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="165" cy="310" r="2.5" fill="#6EE7B7" opacity="0">
        <animate attributeName="opacity" values="0;0.6;0" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="315;295;315" dur="3.2s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
    </g>
