<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="title4 desc4">
  <title id="title4">Smart Meal Planner - Custom Typography</title>
  <desc id="desc4">Monogram SMP with the M shaped as a mountain peak / growth chart</desc>
  <defs>
    <linearGradient id="typ-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="#FFFFFF"/>

  <!-- Letter S -->
  <text x="95" y="320" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="180" font-weight="800" fill="#1E293B" letter-spacing="-5">S</text>

  <!-- Letter M as mountain/growth peak -->
  <g transform="translate(205, 145)">
    <!-- M shape with peak -->
    <path d="M0,175 L0,40 C0,30 5,20 10,12 L55,-45 C60,-52 65,-52 70,-45 L95,0 L120,-45 C125,-52 130,-52 135,-45 L180,12 C185,20 190,30 190,40 L190,175"
          fill="url(#typ-grad)" stroke="none"/>
    <!-- Inner cutouts to make M readable -->
    <path d="M30,175 L30,75 L75,15 L95,50 L95,175 Z" fill="#FFFFFF"/>
    <path d="M95,175 L95,50 L115,15 L160,75 L160,175 Z" fill="#FFFFFF"/>
  </g>

  <!-- Letter P -->
  <text x="390" y="320" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="180" font-weight="800" fill="#1E293B" letter-spacing="-5">P</text>

  <!-- Subtle underline accent -->
  <rect x="90" y="345" width="340" height="5" rx="2.5" fill="#10B981" opacity="0.6"/>
</svg>
