<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-labelledby="title3h">
  <title id="title3h">Smart Meal Planner - Geometric Horizontal</title>
  <defs>
    <linearGradient id="geo-h-p" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="geo-h-c" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="geo-h-f" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B45309"/><stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Donut chart icon -->
  <g transform="translate(72, 80)">
    <g>
      <path d="M0,-52 A52,52 0 0,1 45,26 L30,17.3 A34.7,34.7 0 0,0 0,-34.7 Z" fill="url(#geo-h-p)"/>
      <path d="M45,26 A52,52 0 0,1 -45,26 L-30,17.3 A34.7,34.7 0 0,0 30,17.3 Z" fill="url(#geo-h-c)"/>
      <path d="M-45,26 A52,52 0 0,1 0,-52 L0,-34.7 A34.7,34.7 0 0,0 -30,17.3 Z" fill="url(#geo-h-f)"/>
    </g>
    <circle cx="0" cy="0" r="28" fill="#FFFFFF"/>
    <path d="M0,-10 C5,-7, 7,0, 5,5 C3.5,8.5, 0,10, 0,10 C0,10, -3.5,8.5, -5,5 C-7,0, -5,-7, 0,-10Z" fill="#10B981" opacity="0.8"/>
    <g stroke="#FFFFFF" stroke-width="1.5">
      <line x1="0" y1="-34.7" x2="0" y2="-52"/>
      <line x1="30" y1="17.3" x2="45" y2="26"/>
      <line x1="-30" y1="17.3" x2="-45" y2="26"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#10B981" letter-spacing="-0.5">Smart</text>
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#1E293B" letter-spacing="-0.5" dx="105">Meal</text>
  <text x="160" y="110" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#64748B" letter-spacing="3">PLANNER</text>
