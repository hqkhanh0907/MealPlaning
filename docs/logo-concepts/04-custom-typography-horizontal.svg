<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-labelledby="title4h">
  <title id="title4h">Smart Meal Planner - Custom Typography Horizontal</title>
  <defs>
    <linearGradient id="typ-h-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- SMP Monogram -->
  <g transform="translate(15, 20)">
    <text x="0" y="85" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="52" font-weight="800" fill="#1E293B">S</text>
    <!-- M as mountain -->
    <g transform="translate(38, 32)">
      <path d="M0,53 L0,12 L17,-14 C19,-17 21,-17 23,-14 L29,0 L35,-14 C37,-17 39,-17 41,-14 L58,12 L58,53"
            fill="url(#typ-h-grad)"/>
      <path d="M9,53 L9,22 L22,4 L29,16 L29,53 Z" fill="#FFFFFF"/>
      <path d="M29,53 L29,16 L36,4 L49,22 L49,53 Z" fill="#FFFFFF"/>
    </g>
    <text x="95" y="85" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="52" font-weight="800" fill="#1E293B">P</text>
    <rect x="0" y="95" width="125" height="3" rx="1.5" fill="#10B981" opacity="0.5"/>
  </g>

  <!-- Full name -->
  <text x="170" y="62" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#1E293B" letter-spacing="-0.5">Smart Meal</text>
  <text x="170" y="100" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#64748B" letter-spacing="3">PLANNER</text>
  <!-- Accent dot -->
  <circle cx="173" cy="62" r="0" fill="#10B981"/>
</svg>
