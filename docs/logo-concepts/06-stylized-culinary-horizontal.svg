<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160" role="img" aria-labelledby="title6h">
  <title id="title6h">Smart Meal Planner - Stylized Culinary Horizontal</title>
  <defs>
    <linearGradient id="cul-h-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/><stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Plate + utensils icon -->
  <g transform="translate(72, 80)">
    <!-- Plate -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#cul-h-grad)" stroke-width="4"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#10B981" stroke-width="1.5" opacity="0.25"/>
    <!-- Fork left -->
    <g transform="translate(-48, -35)" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round">
      <line x1="8" y1="25" x2="8" y2="70"/>
      <line x1="2" y1="10" x2="2" y2="28"/>
      <line x1="8" y1="8" x2="8" y2="28"/>
      <line x1="14" y1="10" x2="14" y2="28"/>
      <path d="M2,28 Q8,33 14,28"/>
    </g>
    <!-- Knife right -->
    <g transform="translate(34, -35)" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round">
      <line x1="8" y1="30" x2="8" y2="70"/>
      <path d="M8,8 C13,8 17,15 17,24 C17,28 13,30 8,30"/>
    </g>
    <!-- Center sparkle -->
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#10B981" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#10B981" letter-spacing="-0.5">Smart</text>
  <text x="160" y="72" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#1E293B" letter-spacing="-0.5" dx="105">Meal</text>
  <text x="160" y="110" font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" fill="#64748B" letter-spacing="3">PLANNER</text>
</svg>
