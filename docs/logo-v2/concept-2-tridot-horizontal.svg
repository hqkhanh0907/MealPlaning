      <path d="M0,0 C-10,-10 -16,-8 -20,-4" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M0,-4 C10,-14 16,-10 18,-6" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" fill="none"/>
