      <line x1="148" y1="340" x2="364" y2="340"/>
    </g>
    <circle cx="256" cy="275" r="16" fill="#34D399" opacity="0.4"/>
    <circle cx="256" cy="140" r="64" fill="#10B981"/>
    <g transform="translate(256, 140)">
