      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- Icon (scaled down) -->
  <g transform="translate(16, 16) scale(0.328)">
    <rect width="512" height="512" rx="112" fill="#ECFDF5"/>
    <path d="M256 56 C380 56, 456 160, 456 280 C456 380, 380 456, 256 456 C180 456, 120 420, 96 340 C72 260, 132 56, 256 56Z" fill="url(#lb-h-grad)"/>
    <circle cx="200" cy="340" r="80" fill="#ECFDF5"/>
    <g transform="translate(200, 340)" stroke="#10B981" stroke-width="6" stroke-linecap="round" fill="none">
      <line x1="-16" y1="-30" x2="-16" y2="30"/>
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="16" y1="-30" x2="16" y2="30"/>
      <path d="M-16,-30 C-16,-42 16,-42 16,-30"/>
      <line x1="0" y1="30" x2="0" y2="44"/>
    </g>
    <g transform="translate(370, 140)">
      <circle cx="0" cy="0" r="24" fill="#FFFFFF"/>
      <g stroke="#10B981" stroke-width="5" stroke-linecap="round">
