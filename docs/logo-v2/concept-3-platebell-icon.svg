<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img">
  <title>SmartMeal — PlateBell</title>
  <desc>A bold circle (plate) merged with a barbell bar, topped with an AI sparkle — fusing all 3 pillars into one clean icon</desc>
  <defs>
    <linearGradient id="pb-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="512" height="512" rx="112" fill="#FFFFFF"/>

  <!-- Main circle (plate) -->
  <circle cx="256" cy="268" r="148" fill="url(#pb-grad)"/>

  <!-- Inner circle ring (plate detail) -->
  <circle cx="256" cy="268" r="110" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.35"/>

  <!-- Barbell bar — horizontal through the plate -->
  <rect x="56" y="254" width="400" height="28" rx="14" fill="#047857"/>

  <!-- Barbell weights — left -->
  <rect x="60" y="230" width="40" height="76" rx="10" fill="#047857"/>
  <rect x="36" y="240" width="32" height="56" rx="8" fill="#047857"/>

  <!-- Barbell weights — right -->
  <rect x="412" y="230" width="40" height="76" rx="10" fill="#047857"/>
  <rect x="444" y="240" width="32" height="56" rx="8" fill="#047857"/>

  <!-- Fork + Knife inside plate (centered, white) -->
  <g transform="translate(256, 268)">
    <!-- Fork -->
    <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" fill="none">
      <line x1="-24" y1="-40" x2="-24" y2="40"/>
      <line x1="-36" y1="-40" x2="-36" y2="-12"/>
      <line x1="-12" y1="-40" x2="-12" y2="-12"/>
      <path d="M-36,-12 C-36,-4 -12,-4 -12,-12"/>
    </g>
    <!-- Knife -->
    <g fill="#FFFFFF">
      <path d="M20,-40 C32,-40 36,-20 36,-8 C36,0 30,4 24,4 L20,4 L20,-40Z"/>
      <rect x="17" y="4" width="10" height="36" rx="4"/>
    </g>
  </g>

  <!-- AI Sparkle — top of plate -->
  <g transform="translate(256, 108)">
    <circle cx="0" cy="0" r="28" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="20" fill="#10B981"/>
    <!-- 4-point star -->
    <polygon points="0,-14 4,-4 14,0 4,4 0,14 -4,4 -14,0 -4,-4" fill="#FFFFFF"/>
  </g>
</svg>
