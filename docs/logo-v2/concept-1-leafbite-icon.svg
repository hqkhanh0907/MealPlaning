<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img">
  <title>SmartMeal — LeafBite</title>
  <desc>A bold emerald leaf with a clean circular cutout and AI sparkle accent</desc>
  <defs>
    <linearGradient id="lb-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <clipPath id="lb-clip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#ECFDF5"/>

  <!-- Bold leaf shape — simple, clean -->
  <g clip-path="url(#lb-clip)">
    <path d="M256 56
             C380 56, 456 160, 456 280
             C456 380, 380 456, 256 456
             C180 456, 120 420, 96 340
             C72 260, 132 56, 256 56Z"
          fill="url(#lb-grad)"/>

    <!-- Clean circular cutout — creates "bite" / negative space = plate -->
    <circle cx="200" cy="340" r="80" fill="#ECFDF5"/>

    <!-- Inside the cutout: simple fork icon -->
    <g transform="translate(200, 340)" stroke="#10B981" stroke-width="6" stroke-linecap="round" fill="none">
      <line x1="-16" y1="-30" x2="-16" y2="30"/>
      <line x1="0" y1="-30" x2="0" y2="30"/>
      <line x1="16" y1="-30" x2="16" y2="30"/>
      <path d="M-16,-30 C-16,-42 16,-42 16,-30"/>
      <line x1="0" y1="30" x2="0" y2="44"/>
    </g>

    <!-- Bold AI sparkle — top right area -->
    <g transform="translate(370, 140)">
      <circle cx="0" cy="0" r="24" fill="#FFFFFF"/>
      <g stroke="#10B981" stroke-width="5" stroke-linecap="round">
        <line x1="0" y1="-16" x2="0" y2="16"/>
        <line x1="-16" y1="0" x2="16" y2="0"/>
      </g>
      <g stroke="#10B981" stroke-width="3.5" stroke-linecap="round">
        <line x1="-10" y1="-10" x2="10" y2="10"/>
        <line x1="10" y1="-10" x2="-10" y2="10"/>
      </g>
    </g>

    <!-- Bold dumbbell accent — bottom right -->
    <g transform="translate(360, 370) rotate(-30)">
      <rect x="-36" y="-5" width="72" height="10" rx="5" fill="#FFFFFF"/>
      <rect x="-44" y="-12" width="14" height="24" rx="5" fill="#FFFFFF"/>
      <rect x="30" y="-12" width="14" height="24" rx="5" fill="#FFFFFF"/>
    </g>
  </g>
</svg>
