<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img">
  <title>SmartMeal — NutriFit</title>
  <desc>A bold white circle on emerald with fork-and-dumbbell fusion mark inside</desc>
  <defs>
    <linearGradient id="nf-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
  </defs>

  <!-- Gradient background -->
  <rect width="512" height="512" rx="112" fill="url(#nf-bg)"/>

  <!-- Bold white circle — like a plate -->
  <circle cx="256" cy="256" r="152" fill="#FFFFFF"/>

  <!-- Fork-Dumbbell fusion: a vertical bar with fork tines on top and weight plates on sides -->
  <g transform="translate(256, 256)">
    <!-- Central vertical bar (shared between fork handle and dumbbell bar) -->
    <rect x="-5" y="-80" width="10" height="160" rx="5" fill="#059669"/>

    <!-- Fork tines at top -->
    <rect x="-28" y="-80" width="8" height="48" rx="4" fill="#059669"/>
    <rect x="20" y="-80" width="8" height="48" rx="4" fill="#059669"/>
    <!-- Fork curve connecting tines -->
    <rect x="-28" y="-36" width="56" height="8" rx="4" fill="#059669"/>

    <!-- Dumbbell weight plates at bottom sides -->
    <rect x="-52" y="28" width="18" height="44" rx="6" fill="#059669"/>
    <rect x="34" y="28" width="18" height="44" rx="6" fill="#059669"/>
    <!-- Dumbbell horizontal bar -->
    <rect x="-52" y="44" width="104" height="12" rx="6" fill="#059669"/>
  </g>

  <!-- AI sparkle — small, top right of circle -->
  <g transform="translate(370, 138)">
    <polygon points="0,-16 4,-4 16,0 4,4 0,16 -4,4 -16,0 -4,-4" fill="#FFFFFF"/>
  </g>
</svg>
